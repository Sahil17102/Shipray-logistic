services:
  - type: web
    name: shipray-logistic
    runtime: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    envVars:
      - key: API_BASE_URL
        value: https://shipray-logisticbackend.onrender.com
      - key: BACKEND_URL
        value: https://shipray-logisticbackend.onrender.com
      - key: FRONTEND_URL
        value: https://shipray-logistic.onrender.com
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
